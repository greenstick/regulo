name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Least privilege: this workflow only needs to read the repo. It holds no
# secrets and cannot publish, write to the repo, or mint tokens — so untrusted
# pull-request code runs here with no path to the release.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22', '24', '26']
        os: [ubuntu-latest, macos-latest]
    steps:
      # Third-party and first-party actions alike are pinned to a full commit
      # SHA (not a mutable tag) so a compromised or repointed tag cannot inject
      # code into this run. Bump these deliberately via reviewed PRs.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # `npm ci` installs strictly from the committed lockfile — dependencies
      # cannot drift to unexpected versions mid-run.
      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Validate package (publint + arethetypeswrong)
        run: npm run lint:package
